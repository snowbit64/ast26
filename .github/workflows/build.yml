name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAST26_BUILD_CLI=ON -DAST26_BUILD_GIMP=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast26-windows-x64
          path: build/Release/ast26.exe

  build-android-aarch64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=Release \
            -DAST26_BUILD_CLI=ON \
            -DAST26_BUILD_GIMP=OFF

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast26-android-aarch64
          path: build/ast26

  build-gimp-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GIMP dev headers
        run: sudo apt-get update && sudo apt-get install -y libgimp2.0-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAST26_BUILD_CLI=ON -DAST26_BUILD_GIMP=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast26-gimp2-plugin-linux-x64
          path: build/file-ast26

  build-gimp3-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GIMP 3.0 dev headers
        run: |
          sudo add-apt-repository -y ppa:ubuntuhandbook1/gimp-3
          sudo apt-get update
          sudo apt-get install -y libgimp-3.0-dev libgexiv2-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -DAST26_BUILD_CLI=ON -DAST26_BUILD_GIMP3=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast26-gimp3-plugin-linux-x64
          path: build/file-ast26

  build-gimp-plugin-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gimp
            pkg-config

      - name: Configure CMake
        run: |
          cmake -B build \
            -G "MinGW Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DAST26_BUILD_CLI=ON \
            -DAST26_BUILD_GIMP=ON

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Collect plugin and dependencies
        run: |
          mkdir -p dist
          cp build/file-ast26.exe dist/
          # Copy required MinGW runtime DLLs
          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp /mingw64/bin/$dll dist/ 2>/dev/null || true
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ast26-gimp-plugin-windows-x64
          path: dist/
